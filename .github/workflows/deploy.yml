name: CI-CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t atulsharmagpj/mean-backend:latest ./backend
          docker push atulsharmagpj/mean-backend:latest

      - name: Build & Push Frontend
        run: |
          docker build -t atulsharmagpj/mean-frontend:latest ./frontend
          docker push atulsharmagpj/mean-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd mean-devops-task
            docker-compose pull
            docker-compose down
            docker-compose up -d
